name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository == 'TheClooneyCollection/11ty-subspace-builder'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Eleventy image derivatives
        uses: actions/cache@v5
        with:
          path: .cache/@11ty/img
          key: eleventy-img-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eleventy.config.js', 'assets/images/**/*') }}
          restore-keys: |
            eleventy-img-${{ runner.os }}-

      - name: Cache OG image artifacts
        uses: actions/cache@v5
        with:
          path: .cache/og
          key: og-images-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/generate-og-images.js', '_data/site.yaml', 'posts/**/*.md', 'notes/**/*.md', 'timeline/**/*.md') }}
          restore-keys: |
            og-images-${{ runner.os }}-

      - name: Cache eleventy-fetch data
        uses: actions/cache@v5
        with:
          path: .cache/eleventy-fetch-*
          key: eleventy-fetch-${{ runner.os }}-${{ hashFiles('package-lock.json', 'eleventy.config.js', 'posts/**/*.md', 'notes/**/*.md', 'timeline/**/*.md') }}
          restore-keys: |
            eleventy-fetch-${{ runner.os }}-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run vitest (builds _site via globalSetup)
        run: npm test

      - name: Run Playwright smoke
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
